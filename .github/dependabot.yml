version: 2

registries:
  github-packages:
    type: nuget-feed
    url: https://nuget.pkg.github.com/rafalczajka/index.json
    username: rafalczajka
    password: ${{secrets.DEPENDABOT_GITHUB_PACKAGES_TOKEN}}

updates:
  - package-ecosystem: nuget
    directory: /
    registries:
      - github-packages
    schedule:
      interval: monthly
    ignore:
      - dependency-name: "Microsoft.CodeAnalysis.Analyzers"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "Microsoft.CodeAnalysis.CSharp"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
    groups:
      nuget:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
